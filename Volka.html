<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volka | تواصل معنا</title>
    <!-- استدعاء أيقونات Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- استدعاء خط Cairo من جوجل -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0b0b0b;
            --card-bg: #161616;
            --text-color: #ffffff;
            --text-muted: #a0a0a0;
            --accent-color: #ffffff;
            --hover-bg: #222222;
            --fb-color: #1877F2;
            --ig-color: #E1306C;
            --wa-color: #25D366;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            background-image: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #0b0b0b 100%);
        }

        .container {
            width: 100%;
            max-width: 450px;
            text-align: center;
            background: rgba(22, 22, 22, 0.8);
            padding: 40px 30px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        /* البراند واللوجو */
        .logo-area {
            margin-bottom: 30px;
        }

        .brand-logo {
            width: 90px;
            height: 90px;
            background: var(--accent-color);
            color: var(--bg-color);
            border-radius: 50%;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 15px;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .brand-tagline {
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 300;
        }

        /* أزرار التواصل */
        .links-wrapper {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-top: 35px;
        }

        .social-link {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 14px;
            text-decoration: none;
            color: var(--text-color);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            overflow: hidden;
        }

        .social-link:hover {
            transform: translateY(-3px);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .link-content {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .link-content i {
            font-size: 22px;
            width: 30px;
            text-align: center;
        }

        .link-text {
            font-size: 16px;
            font-weight: 700;
        }

        .arrow-icon {
            font-size: 14px;
            color: var(--text-muted);
            transition: transform 0.3s ease;
        }

        .social-link:hover .arrow-icon {
            transform: translateX(-5px); /* يتحرك لليسار لأن الاتجاه RTL */
            color: var(--accent-color);
        }

        /* ألوان مخصصة لكل منصة عند الـ Hover (اختياري لجمالية التصميم) */
        .facebook-btn:hover i { color: var(--fb-color); }
        .instagram-btn:hover i { color: var(--ig-color); }
        .whatsapp-btn:hover i { color: var(--wa-color); }

        /* الفوتر */
        .footer {
            margin-top: 40px;
            font-size: 12px;
            color: var(--text-muted);
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- قسم اللوجو والاسم -->
        <div class="logo-area">
            <!-- يمكنك استبدال حرف V بصورة اللوجو الخاصة بك مستقبلاً باستخدام كود <img src="logo.png"> -->
            <div class="brand-logo">V</div>
            <h1 class="brand-name">VOLKA</h1>
            <p class="brand-tagline">أزياء تعبر عن شخصيتك • تواصل معنا الآن</p>
        </div>

        <!-- قسم روابط التواصل -->
        <div class="links-wrapper">
            
            <!-- فيسبوك -->
            <a href="https://www.facebook.com/people/Volkaeg/61591210378138/" target="_blank" class="social-link facebook-btn">
                <div class="link-content">
                    <i class="fab fa-facebook-f"></i>
                    <span class="link-text">تابعنا على فيسبوك</span>
                </div>
                <i class="fas fa-chevron-left arrow-icon"></i>
            </a>

            <!-- انستجرام -->
            <a href="https://www.instagram.com/volka.eg/" target="_blank" class="social-link instagram-btn">
                <div class="link-content">
                    <i class="fab fa-instagram"></i>
                    <span class="link-text">تابعنا على انستجرام</span>
                </div>
                <i class="fas fa-chevron-left arrow-icon"></i>
            </a>

            <!-- واتساب -->
            <a href="https://wa.me/201014305660" target="_blank" class="social-link whatsapp-btn">
                <div class="link-content">
                    <i class="fab fa-whatsapp"></i>
                    <span class="link-text">تواصل معنا عبر واتساب</span>
                </div>
                <i class="fas fa-chevron-left arrow-icon"></i>
            </a>

        </div>

        <!-- الفوتر -->
        <div class="footer">
            &copy; 2026 VOLKA EG. All Rights Reserved.
        </div>
    </div>

</body>
</html>
